name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  BUNDLE_JOBS: 4
  BUNDLE_RETRY: 3

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ".ruby-version"
          bundler-cache: true
      - run: bundle exec rubocop --parallel

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ".ruby-version"
          bundler-cache: true
      - run: bundle exec bundle-audit check --update

  test:
    name: RSpec (Ruby ${{ matrix.ruby }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["4.0.3"]
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - run: bundle exec rspec

  integration:
    name: Integration (rails new + boot)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGHOST:     "localhost"
      PGPORT:     "5432"
      PGUSER:     "postgres"
      PGPASSWORD: "postgres"
      # The integration suite shells out to `rails new` — barely any of
      # the gem's own code runs under coverage, so the 90% minimum
      # configured in spec_helper would fail spuriously. Skip simplecov.
      COVERAGE:   "false"
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ".ruby-version"
          bundler-cache: true
      - name: Install Rails CLI globally so `rails new` is on PATH
        run: gem install rails -v "~> 8.1" --no-document
      - run: bundle exec rspec spec/integration_full/ --tag type:integration_full
