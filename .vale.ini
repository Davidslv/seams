# Vale prose-lint config for Seams' documentation.
# https://vale.sh/
#
# This runs ADVISORY in CI today (the docs predate it). Once the existing
# prose is clean, promote the `prose` job in .github/workflows/docs.yml to
# blocking by removing its `continue-on-error: true`.

StylesPath = .github/styles
MinAlertLevel = warning

# Downloaded by the vale-action in CI (and `vale sync` locally).
Packages = Google

[*.md]
BasedOnStyles = Vale, Google

# Too noisy for a technical Ruby/Rails docset — we have many proper nouns,
# code identifiers, and domain terms. Re-enable with a project vocabulary
# (accept.txt) when someone wants to invest in it.
Vale.Spelling = NO
Google.Acronyms = NO
Google.Headings = NO
